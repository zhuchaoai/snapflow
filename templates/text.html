<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1242">
<title>{{FILENAME}}</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 1242px; height: 1660px;
  overflow: hidden;
  font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: {{PAGE_BG}};
}
body::before {
  content: ''; position: absolute; inset: 0;
  background: {{GRID_OVERLAY}}
  pointer-events: none; z-index: 1;
}
body::after {
  content: ''; position: absolute; bottom: 0; left: 0; right: 0;
  height: 4px;
  background: {{BOTTOM_BAR_GRADIENT}};
  z-index: 2;
}
.wrapper {
  position: relative; z-index: 3;
  height: 100%; display: flex; flex-direction: column;
  justify-content: center;
  padding: 48px 56px 60px;
}
.brand {
  position: absolute; top: 24px; left: 36px; z-index: 5;
  font-size: 22px; color: rgba(255,255,255,0.35);
  display: flex; align-items: center; gap: 6px;
}
.page-num {
  position: absolute; top: 50px; right: 56px;
  font-size: {{PAGE_NUM_FS}}; font-weight: 500;
  color: {{PAGE_NUM_COLOR}};
}
.section-title {
  font-size: {{SECTION_TITLE_FS}}; font-weight: 700; line-height: 1.3;
  color: {{SECTION_TITLE_COLOR}};
  margin-top: 40px;
}
.lines {
  margin-top: 44px; display: flex; flex-direction: column;
  gap: 6px; flex: 1; justify-content: center;
}
.line {
  font-size: 40px; color: {{TEXT_COLOR}}; line-height: 1.5;
  padding: 14px 24px;
}
.line.highlight {
  background: {{HIGHLIGHT_GRADIENT}};
  padding: 20px 32px; border-radius: 14px;
  font-weight: 600; color: {{TEXT_HIGHLIGHT_COLOR}};
  border-left: 5px solid {{TEXT_HIGHLIGHT_COLOR}};
  margin: 8px 0;
  box-shadow: 0 2px 12px {{ACCENT_GLOW}};
  font-size: 42px;
}
.line.empty { height: 24px; }
.footer-text {
  margin-top: auto; text-align: center;
  font-size: 26px; color: {{FOOTER_COLOR}}; letter-spacing: 4px;
  padding-top: 24px;
  border-top: 1px solid {{FOOTER_BORDER_COLOR}};
}
</style>
</head>
<body>
<div class="wrapper">
  <div class="brand">{{BRAND_ICON}} {{BRAND_NAME}}</div>
  <div class="page-num">{{PAGE_NUM}}</div>
  <div class="section-title">{{SECTION_TITLE}}</div>
  <div class="lines">{{TEXT_LINES_HTML}}</div>
  <div class="footer-text">{{FOOTER_TEXT}}</div>
</div>
</body>
</html>
