<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1242">
<title>{{FILENAME}}</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 1242px; height: 1660px;
  overflow: hidden;
  font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: {{PAGE_BG}};
}
body::before {
  content: ''; position: absolute; inset: 0;
  background: {{GRID_OVERLAY}}
  pointer-events: none; z-index: 1;
}
body::after {
  content: ''; position: absolute; bottom: 0; left: 0; right: 0;
  height: 4px;
  background: {{BOTTOM_BAR_GRADIENT}};
  z-index: 2;
}
.wrapper {
  position: relative; z-index: 3;
  height: 100%; display: flex; flex-direction: column;
  justify-content: center;
  padding: 48px 56px 60px;
}
.brand {
  position: absolute; top: 24px; left: 36px; z-index: 5;
  font-size: 22px; color: rgba(255,255,255,0.35);
  display: flex; align-items: center; gap: 6px;
}
.pill {
  position: absolute; top: 50px; left: 56px;
  padding: 6px 18px; border-radius: 20px;
  font-size: 22px; font-weight: 500;
  border: 1px solid {{PILL_BORDER}};
  background: {{PILL_BG}};
  color: {{PILL_TEXT}};
}
.comp-page-num {
  position: absolute; top: 50px; right: 56px;
  font-size: 28px; font-weight: 500; color: {{PAGE_NUM_COLOR}};
}
.section-title {
  font-size: 52px; font-weight: 700; line-height: 1.3;
  color: {{SECTION_TITLE_COLOR}};
  margin-top: 60px; text-align: center;
}
.cols { display: flex; gap: 16px; margin-top: 36px; flex: 1; align-items: stretch; }
.col {
  flex: 1; display: flex; flex-direction: column; gap: 12px;
}
.col-header {
  text-align: center; padding: 24px 12px; border-radius: 16px;
}
.col-left .col-header { background: {{COMPARE_LEFT_HEADER_BG}}; border: 2px solid {{COMPARE_LEFT_HEADER_BORDER}}; }
.col-left .col-header-label { font-size: 34px; font-weight: 700; color: {{COMPARE_LEFT_HEADER_TEXT}}; }
.col-left .col-header-sub { font-size: 24px; color: {{COMPARE_LEFT_HEADER_SUB}}; margin-top: 4px; }
.col-right .col-header { background: {{COMPARE_RIGHT_HEADER_BG}}; border: 2px solid {{COMPARE_RIGHT_HEADER_BORDER}}; }
.col-right .col-header-label { font-size: 34px; font-weight: 700; color: {{COMPARE_RIGHT_HEADER_TEXT}}; }
.col-right .col-header-sub { font-size: 24px; color: {{COMPARE_RIGHT_HEADER_SUB}}; margin-top: 4px; }
.col-item {
  background: {{CARD_BG_COLOR}}; border: 1px solid {{CARD_BORDER_COLOR}};
  border-radius: 14px; padding: 20px 24px;
  flex: 1; display: flex; flex-direction: column; justify-content: center;
  box-shadow: 0 1px 6px rgba(0,0,0,0.03);
}
.col-item .item-label { font-size: 26px; color: {{CARD_DESC_COLOR}}; font-weight: 500; margin-bottom: 2px; }
.col-item .item-value { font-size: 32px; color: {{CARD_TITLE_COLOR}}; font-weight: 600; }
.col-left .col-item { border-left: 3px solid {{COMPARE_LEFT_ACCENT}}; }
.col-right .col-item { border-left: 3px solid {{COMPARE_RIGHT_ACCENT}}; }
.vs-col {
  display: flex; flex-direction: column; align-items: center;
  width: 70px; flex-shrink: 0;
}
.vs-col::before, .vs-col::after {
  content: ''; flex: 1; width: 1px;
  background: linear-gradient(to bottom, transparent, {{VS_BORDER}}, transparent);
}
.vs-circle {
  width: 56px; height: 56px; border-radius: 28px;
  background: {{VS_BG}}; border: 2px solid {{VS_BORDER}};
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; color: {{VS_TEXT}}; font-weight: 700;
  margin: 8px 0;
}
.summary-box {
  text-align: center; padding: 22px 28px;
  background: {{SUMMARY_BG}}; border: 1px solid {{SUMMARY_BORDER}};
  border-radius: 16px; margin-top: 16px;
}
.summary-text { font-size: 28px; color: {{SUMMARY_TEXT}}; font-weight: 500; }
</style>
</head>
<body>
<div class="wrapper">
  <div class="brand">{{BRAND_ICON}} {{BRAND_NAME}}</div>
  <div class="pill">{{PILL_NAME}}</div>
  <div class="comp-page-num">{{COMPARE_PAGE_NUM}}</div>
  <div class="section-title">{{COMPARE_SECTION_TITLE}}</div>
  <div class="cols">
    <div class="col col-left">
      <div class="col-header">
        <div class="col-header-label">{{COMPARE_LEFT_HEADER}}</div>
        <div class="col-header-sub">{{COMPARE_LEFT_SUB}}</div>
      </div>
      {{COMPARE_LEFT_ITEMS}}
    </div>
    <div class="vs-col">
      <div class="vs-circle">{{COMPARE_VS_TEXT}}</div>
    </div>
    <div class="col col-right">
      <div class="col-header">
        <div class="col-header-label">{{COMPARE_RIGHT_HEADER}}</div>
        <div class="col-header-sub">{{COMPARE_RIGHT_SUB}}</div>
      </div>
      {{COMPARE_RIGHT_ITEMS}}
    </div>
  </div>
  <div class="summary-box">
    <div class="summary-text">{{COMPARE_SUMMARY_TEXT}}</div>
  </div>
</div>
</body>
</html>
