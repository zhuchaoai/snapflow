<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1242">
<title>{{FILENAME}}</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 1242px; height: 1660px;
  overflow: hidden;
  font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: {{PAGE_BG}};
}
body::before {
  content: ''; position: absolute; inset: 0;
  background: {{GRID_OVERLAY}}
  pointer-events: none; z-index: 1;
}
body::after {
  content: ''; position: absolute; bottom: 0; left: 0; right: 0;
  height: 4px;
  background: {{BOTTOM_BAR_GRADIENT}};
  z-index: 2;
}
.wrapper {
  position: relative; z-index: 3;
  height: 100%; display: flex; flex-direction: column;
  justify-content: center;
  padding: 48px 56px 60px;
}
.brand {
  position: absolute; top: 24px; left: 36px; z-index: 5;
  font-size: 22px; color: rgba(255,255,255,0.35);
  display: flex; align-items: center; gap: 6px;
}
.page-num {
  position: absolute; top: 50px; right: 56px;
  font-size: {{PAGE_NUM_FS}}; font-weight: 500;
  color: {{PAGE_NUM_COLOR}};
}
.section-title {
  font-size: {{SECTION_TITLE_FS}}; font-weight: 700; line-height: 1.3;
  color: {{SECTION_TITLE_COLOR}};
  margin-top: 40px;
}
.cards { display: flex; flex-direction: column; gap: 20px; margin-top: 36px; flex: 1; justify-content: center; }
.card {
  display: flex; align-items: center; gap: 24px;
  background: {{CARD_BG_COLOR}}; border: 1px solid {{CARD_BORDER_COLOR}};
  border-radius: 18px; padding: 30px 34px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.04);
}
.c-icon {
  width: 72px; height: 72px; border-radius: 36px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 32px; font-weight: 700; color: #ffffff;
}
.content-card .c-icon { background: {{ACCENT_GRADIENT_VAR}}; }
.content-card:nth-child(2) .c-icon { background: {{ACCENT_GRADIENT_VAR}}; }
.content-card:nth-child(3) .c-icon { background: {{ACCENT_GRADIENT_VAR}}; }
.c-title { font-size: 36px; font-weight: 600; color: {{CARD_TITLE_COLOR}}; }
.c-desc { font-size: 28px; color: {{CARD_DESC_COLOR}}; margin-top: 4px; line-height: 1.4; }
.footer-text {
  margin-top: auto; text-align: center;
  font-size: 26px; color: {{FOOTER_COLOR}}; letter-spacing: 4px;
  padding-top: 24px;
  border-top: 1px solid {{FOOTER_BORDER_COLOR}};
}
</style>
</head>
<body>
<div class="wrapper">
  <div class="brand">{{BRAND_NAME}}</div>
  <div class="page-num">{{PAGE_NUM}}</div>
  <div class="section-title">{{SECTION_TITLE}}</div>
  <div class="cards">{{CARDS_HTML}}</div>
  <div class="footer-text">{{FOOTER_TEXT}}</div>
</div>
</body>
</html>
