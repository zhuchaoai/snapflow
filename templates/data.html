<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1242">
<title>{{FILENAME}}</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 1242px; height: 1660px;
  overflow: hidden;
  font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: {{PAGE_BG}};
}
body::before {
  content: ''; position: absolute; inset: 0;
  background: {{GRID_OVERLAY}}
  pointer-events: none; z-index: 1;
}
body::after {
  content: ''; position: absolute; bottom: 0; left: 0; right: 0;
  height: 4px;
  background: {{BOTTOM_BAR_GRADIENT}};
  z-index: 2;
}
.wrapper {
  position: relative; z-index: 3;
  height: 100%; display: flex; flex-direction: column;
  justify-content: center;
  padding: 48px 56px 60px;
}
.brand {
  position: absolute; top: 24px; left: 36px; z-index: 5;
  font-size: 22px; color: rgba(255,255,255,0.35);
  display: flex; align-items: center; gap: 6px;
}
.page-num {
  position: absolute; top: 50px; right: 56px;
  font-size: {{PAGE_NUM_FS}}; font-weight: 500;
  color: {{PAGE_NUM_COLOR}};
}
.section-title {
  font-size: {{SECTION_TITLE_FS}}; font-weight: 700; line-height: 1.3;
  color: {{SECTION_TITLE_COLOR}};
  margin-top: 40px;
}
.stats {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 24px; margin-top: 48px;
  flex: 1; align-content: center;
}
.stat-item {
  background: {{STAT_BG}}; border: 1px solid {{STAT_BORDER}};
  border-radius: 20px; padding: 44px 28px;
  text-align: center;
  box-shadow: 0 2px 12px rgba(0,0,0,0.04);
}
.stat-value { font-size: 78px; font-weight: 700; color: {{STAT_VALUE_COLOR}}; letter-spacing: -2px; }
.stat-label { font-size: 28px; color: {{STAT_LABEL_COLOR}}; margin-top: 6px; }
.stat-item.highlight {
  background: {{STAT_HIGHLIGHT_BG}};
  border-color: {{STAT_HIGHLIGHT_BORDER}};
  box-shadow: {{STAT_HIGHLIGHT_SHADOW}};
  transform: scale(1.03);
}
.stat-item.highlight .stat-value { color: {{STAT_HIGHLIGHT_VALUE_COLOR}}; }
.stat-item.highlight .stat-label { color: {{STAT_HIGHLIGHT_VALUE_COLOR}}; font-weight: 500; }
.footer-text {
  margin-top: auto; text-align: center;
  font-size: 26px; color: {{FOOTER_COLOR}}; letter-spacing: 4px;
  padding-top: 24px;
  border-top: 1px solid {{FOOTER_BORDER_COLOR}};
}
</style>
</head>
<body>
<div class="wrapper">
  <div class="brand">{{BRAND_NAME}}</div>
  <div class="page-num">{{PAGE_NUM}}</div>
  <div class="section-title">{{SECTION_TITLE}}</div>
  <div class="stats">{{STAT_ITEMS_HTML}}</div>
  <div class="footer-text">{{FOOTER_TEXT}}</div>
</div>
</body>
</html>
